<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Detector</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 50px; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; }
        h2 { color: #333; text-align: center; }
        textarea { width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; resize: vertical; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background-color: #2c3e50; color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #34495e; }
        #result-box { margin-top: 25px; padding: 15px; border-radius: 8px; display: none; text-align: center; }
        .verdict { font-size: 20px; font-weight: bold; margin-bottom: 5px; }
        .confidence { font-size: 16px; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <h2>AI vs Human Text Detector</h2>
    <p style="color: #666; font-size: 14px;">Paste the text below to analyze its origin using Machine Learning.</p>
    
    <textarea id="userInput" rows="8" placeholder="Enter text here (at least 50 words recommended for accuracy)..."></textarea>
    
    <button onclick="analyzeText()">Analyze Origin</button>

    <div id="result-box">
        <div class="verdict" id="verdict"></div>
        <div class="confidence" id="confidence"></div>
    </div>
</div>

<script>
    async function analyzeText() {
        const text = document.getElementById('userInput').value;
        const resultBox = document.getElementById('result-box');
        const verdictDiv = document.getElementById('verdict');
        const confidenceDiv = document.getElementById('confidence');

        if (!text.trim()) {
            alert("Please enter some text!");
            return;
        }

        try {
            const response = await fetch('http://127.0.0.1:8000/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text })
            });

            const data = await response.json();

            // Display results
            resultBox.style.display = 'block';
            verdictDiv.innerText = data.verdict;
            confidenceDiv.innerText = `AI Probability: ${data.confidence}`;

            // Simple coloring based on result
            if (data.verdict.includes("AI")) {
                resultBox.style.backgroundColor = '#fdeaea';
                verdictDiv.style.color = '#c0392b';
            } else {
                resultBox.style.backgroundColor = '#eafaf1';
                verdictDiv.style.color = '#27ae60';
            }

        } catch (error) {
            alert("Error connecting to the backend. Make sure FastAPI is running!");
        }
    }
</script>

</body>
</html>
